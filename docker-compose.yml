version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lis_car_wash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lis_car_wash"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 6G

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=lis_car_wash
      - JWT_SECRET=lis-car-wash-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=1d
      - JWT_REFRESH_SECRET=lis-car-wash-refresh-secret-change-in-production
      - JWT_REFRESH_EXPIRES_IN=7d
      # AI Chatbot
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - AI_DB_USER=ai_chatbot_user
      - AI_DB_PASSWORD=ai_chatbot_password
      # Performance tuning (override via .env or shell env)
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
    ports:
      - "127.0.0.1:3091:3001"
    depends_on:
      database:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  ui:
    build:
      context: ./UI
      dockerfile: Dockerfile
      args:
        # This MUST be the HTTPS address!
        - VITE_API_URL=https://api-carwash.mylisapp.online/api
    ports:
      - "127.0.0.1:8085:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
